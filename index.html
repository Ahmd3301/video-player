<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Pro Streamer - MX Edition</title>

    <!-- المحركات الأساسية -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.6/shaka-player.compiled.js"></script>
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@500&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #05070a;
            --card: #10141d;
            --accent: #00e87a;
            --text: #e1e4e8;
            --dim: #8b949e;
            --border: #1b2129;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background: var(--bg);
            color: var(--text);
            margin: 0; padding: 0;
            font-family: 'Inter', sans-serif;
            direction: ltr; /* لسهولة قراءة الروابط */
            overflow-x: hidden;
        }

        /* --- UI COMPACT DESIGN --- */
        .header {
            height: 56px; background: var(--bg);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 20px; border-bottom: 1px solid var(--border);
        }
        .header h1 { font-size: 15px; font-weight: 700; color: var(--accent); letter-spacing: -0.5px; }

        .player-container {
            width: 100%; aspect-ratio: 16/9; background: #000;
            position: sticky; top: 0; z-index: 1000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        video { width: 100%; height: 100%; }

        .input-area { padding: 20px; background: var(--bg); }
        .input-wrapper {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 12px; padding: 12px 16px; margin-bottom: 12px;
            display: flex; align-items: center;
        }
        input {
            background: transparent; border: none; color: #fff;
            flex: 1; font-size: 14px; outline: none; font-family: 'IBM Plex Mono';
        }
        .paste-btn { color: var(--accent); font-size: 11px; font-weight: 700; padding: 5px 10px; border: 1px dashed var(--accent); border-radius: 6px; margin-left: 10px; }

        .play-btn {
            background: var(--accent); color: #000;
            width: 100%; padding: 15px; border: none;
            border-radius: 12px; font-weight: 700; font-size: 14px;
            cursor: pointer; transition: 0.2s;
        }
        .play-btn:active { transform: scale(0.98); opacity: 0.9; }

        /* --- LIBRARY LIST (MX STYLE) --- */
        .library-label { padding: 10px 20px; font-size: 12px; color: var(--dim); font-weight: 700; text-transform: uppercase; }
        .list-item {
            display: flex; align-items: center; padding: 12px 20px;
            border-bottom: 1px solid var(--border); transition: 0.2s;
        }
        .list-item:active { background: var(--card); }
        .icon-box {
            width: 40px; height: 40px; background: var(--card);
            border-radius: 10px; display: flex; align-items: center;
            justify-content: center; font-size: 18px; margin-right: 15px;
            border: 1px solid var(--border);
        }
        .item-info { flex: 1; min-width: 0; }
        .item-title { font-size: 14px; font-weight: 600; margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .item-sub { font-size: 11px; color: var(--dim); font-family: 'IBM Plex Mono'; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        #status-bar {
            position: fixed; bottom: 0; width: 100%; 
            background: var(--accent); color: #000;
            font-size: 10px; font-weight: 700; text-align: center;
            padding: 3px 0; display: none; z-index: 2000;
        }

        /* Context Menu */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 3000; }
        .modal-content { background: var(--card); width: 220px; border-radius: 16px; border: 1px solid var(--border); overflow: hidden; }
        .modal-btn { padding: 15px; text-align: center; font-size: 13px; font-weight: 600; border-bottom: 1px solid var(--border); }
        .modal-btn.delete { color: #ff4d4d; }
    </style>
</head>
<body>

    <div class="header">
        <h1>PRO PLAYER <span>v2.0</span></h1>
        <div style="color: var(--dim); font-size: 18px;" onclick="location.reload()">🔄</div>
    </div>

    <div class="player-container">
        <video id="video-player" crossorigin="anonymous" playsinline></video>
    </div>

    <div id="status-bar">LOADING STREAM...</div>

    <div class="input-area">
        <div class="input-wrapper">
            <input type="text" id="main-url" placeholder="Paste link or page URL with ###extractor">
            <div class="paste-btn" onclick="handlePaste()">PASTE</div>
        </div>
        <button class="play-btn" onclick="startSmartPlay()">START STREAMING</button>
    </div>

    <div class="library-label">Recent Library</div>
    <div id="library-list">
        <!-- Items go here -->
    </div>

    <div class="modal" id="modal" onclick="this.style.display='none'">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="modal-btn" onclick="deleteItem()">Delete from list</div>
            <div class="modal-btn" onclick="copyItem()">Copy URL</div>
        </div>
    </div>

<script>
    let library = JSON.parse(localStorage.getItem('mx_library') || '[]');
    let plyrInstance;
    let shakaPlayer;
    let selectedIdx = -1;

    // --- Core Playback Engine ---

    async function startSmartPlay(urlFromList = null) {
        const url = urlFromList || document.getElementById('main-url').value.trim();
        if (!url) return;

        const video = document.getElementById('video-player');
        const status = document.getElementById('status-bar');
        status.style.display = 'block';

        // Destroy previous instances
        if (plyrInstance) plyrInstance.destroy();
        if (shakaPlayer) await shakaPlayer.destroy();

        const [cleanUrl, keysStr] = url.split('###');

        // Logic for Extractor
        if (keysStr && keysStr.includes('extract')) {
            status.innerText = "EXTRACTING SOURCE...";
            // We assume the extractor logic will eventually return a direct m3u8
        }

        try {
            // Check for MPD (DASH)
            if (cleanUrl.includes('.mpd')) {
                status.innerText = "DRM ENGINE: SHAKA PLAYER";
                shaka.polyfill.installAll();
                shakaPlayer = new shaka.Player(video);
                if (keysStr && keysStr.includes(':')) {
                    const [key, id] = keysStr.split(':');
                    shakaPlayer.configure({ drm: { clearKeys: { [b64ToHex(id)]: b64ToHex(key) } } });
                }
                await shakaPlayer.load(cleanUrl);
            } 
            // Check for M3U8 (HLS)
            else if (cleanUrl.includes('.m3u8')) {
                status.innerText = "HLS ENGINE: HLS.JS";
                if (Hls.isSupported()) {
                    const hls = new Hls({
                        xhrSetup: (xhr) => { xhr.withCredentials = false; }
                    });
                    hls.loadSource(cleanUrl);
                    hls.attachMedia(video);
                } else {
                    video.src = cleanUrl;
                }
            } 
            // MP4/Normal
            else {
                video.src = cleanUrl;
            }

            // Init Plyr for the beautiful UI
            plyrInstance = new Plyr(video, {
                controls: ['play-large', 'play', 'progress', 'current-time', 'duration', 'mute', 'volume', 'settings', 'fullscreen']
            });

            if (!urlFromList) saveToLibrary(cleanUrl);
            status.style.display = 'none';
        } catch (e) {
            status.innerText = "ERROR: " + e.message;
            status.style.background = "#ff4d4d";
        }
    }

    // --- Library Management ---

    function saveToLibrary(url) {
        if (library.some(i => i.url === url)) return;
        library.unshift({ url, title: "Stream " + (library.length + 1) });
        localStorage.setItem('mx_library', JSON.stringify(library));
        renderLibrary();
    }

    function renderLibrary() {
        const container = document.getElementById('library-list');
        container.innerHTML = library.map((item, idx) => `
            <div class="list-item" onclick="startSmartPlay('${item.url}')" oncontextmenu="showModal(event, ${idx})">
                <div class="icon-box">🎬</div>
                <div class="item-info">
                    <div class="item-title">${item.title}</div>
                    <div class="item-sub">${item.url}</div>
                </div>
            </div>
        `).join('');
    }

    function showModal(e, idx) {
        e.preventDefault();
        selectedIdx = idx;
        document.getElementById('modal').style.display = 'flex';
    }

    function deleteItem() {
        library.splice(selectedIdx, 1);
        localStorage.setItem('mx_library', JSON.stringify(library));
        renderLibrary();
        document.getElementById('modal').style.display = 'none';
    }

    // --- Utilities ---

    async function handlePaste() {
        const text = await navigator.clipboard.readText();
        document.getElementById('main-url').value = text;
    }

    function b64ToHex(str) {
        const b = atob(str.replace(/-/g, '+').replace(/_/g, '/'));
        let res = "";
        for (let i = 0; i < b.length; i++) {
            let h = b.charCodeAt(i).toString(16);
            res += (h.length === 1 ? '0' + h : h);
        }
        return res;
    }

    window.onload = renderLibrary;
</script>
</body>
</html>
