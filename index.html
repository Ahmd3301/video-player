<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#000000">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Video Player — Online Streaming</title>

<!-- Plyr Player -->
<link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
<script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;600;700&family=Tajawal:wght@300;400;700;900&display=swap" rel="stylesheet">

<style>
/* ─── PLYR THEME ─── */
:root {
  --plyr-color-main: #00e87a;
  --plyr-video-background: #000;
  --plyr-font-family: 'IBM Plex Mono', monospace;
  --plyr-badge-background: #10141a;
  --plyr-menu-background: #10141a;
  --plyr-menu-color: #bccdd8;
  --plyr-menu-border-color: #1a2030;
}

/* ─── DESIGN SYSTEM ─── */
:root {
  --bg: #060809;
  --surface: #0c0f12;
  --panel: #10141a;
  --border: #1a2030;
  --border2: #232d3d;
  --green: #00e87a;
  --yellow: #ffcc00;
  --red: #ff3d3d;
  --blue: #3d9eff;
  --cyan: #00d4ff;
  --dim: #2a3545;
  --text: #bccdd8;
  --text-dim: #4a5e72;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Tajawal', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

body { padding: 12px; }

/* ─── HEADER ─── */
.header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 16px; gap: 10px; flex-wrap: wrap; padding-bottom: 12px; border-bottom: 1px solid var(--border); }
.header-left h1 { font-family: 'IBM Plex Mono', monospace; font-size: clamp(0.75rem, 3vw, 1rem); color: var(--green); letter-spacing: 0.06em; }
.header-left p { font-size: clamp(0.6rem, 2.5vw, 0.75rem); color: var(--text-dim); font-family: 'IBM Plex Mono', monospace; margin-top: 5px; }

/* ─── PANELS & COMPONENTS ─── */
.panel { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 16px; margin-bottom: 16px; }
.panel-hd { font-family: 'IBM Plex Mono', monospace; font-size: clamp(0.65rem, 2vw, 0.8rem); color: var(--text-dim); letter-spacing: .05em; margin-bottom: 12px; }

.btn { font-family: 'IBM Plex Mono', monospace; font-size: 0.75rem; font-weight: 600; padding: 8px 16px; border-radius: 5px; cursor: pointer; border: 1px solid; transition: all .15s; background: transparent; }
.btn-dim { border-color: var(--dim); color: var(--text-dim); }
.btn-dim:hover { background: var(--border); color: #fff; }
.btn-green { border-color: var(--green); color: var(--green); }
.btn-green:hover { background: rgba(0, 232, 122, 0.15); }
.btn-red { border-color: var(--red); color: var(--red); }
.btn-red:hover { background: rgba(255, 61, 61, 0.15); }

/* ─── INPUT AREA ─── */
.input-section { margin-bottom: 16px; }
.input-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; }
.input-field { flex: 1; min-width: 150px; padding: 10px 12px; background: var(--surface); border: 1px solid var(--border2); border-radius: 6px; color: var(--text); font-family: 'Tajawal', sans-serif; font-size: 0.9rem; outline: none; transition: all 0.2s; }
.input-field:focus { border-color: var(--green); box-shadow: 0 0 0 2px rgba(0, 232, 122, 0.1); }
.input-field::placeholder { color: var(--text-dim); }

/* ─── PLAYER VIEW ─── */
.video-panel { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; margin-bottom: 16px; }
#video-wrapper { background: #000; width: 100%; position: relative; }
#video-wrapper .plyr { width: 100%; border-radius: 0; }

/* ─── SAVED VIDEOS LIST ─── */
.saved-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px; }
.video-item { background: var(--surface); border: 1px solid var(--border2); border-radius: 8px; padding: 12px; cursor: pointer; transition: all 0.2s; display: flex; flex-direction: column; justify-content: space-between; min-height: 120px; }
.video-item:hover { border-color: var(--green); background: rgba(0, 232, 122, 0.05); }
.video-item-title { font-size: 0.85rem; color: var(--text); margin-bottom: 8px; line-height: 1.3; font-weight: 600; word-break: break-word; }
.video-item-url { font-size: 0.65rem; color: var(--text-dim); font-family: 'IBM Plex Mono', monospace; word-break: break-all; margin-bottom: 8px; }
.video-item-actions { display: flex; gap: 6px; }
.video-item-btn { flex: 1; padding: 6px 8px; font-size: 0.65rem; border: none; border-radius: 4px; cursor: pointer; transition: all 0.15s; font-family: 'IBM Plex Mono', monospace; }
.video-item-play { background: rgba(0, 232, 122, 0.2); color: var(--green); }
.video-item-play:hover { background: rgba(0, 232, 122, 0.35); }
.video-item-delete { background: rgba(255, 61, 61, 0.2); color: var(--red); }
.video-item-delete:hover { background: rgba(255, 61, 61, 0.35); }

/* ─── STATUS & MESSAGES ─── */
.status-msg { font-family: 'IBM Plex Mono', monospace; font-size: 0.8rem; padding: 10px 12px; border-radius: 6px; margin-bottom: 10px; display: none; animation: slideIn 0.3s ease; }
.status-msg.show { display: block; }
.status-success { background: rgba(0, 232, 122, 0.15); color: var(--green); border: 1px solid var(--green); }
.status-error { background: rgba(255, 61, 61, 0.15); color: var(--red); border: 1px solid var(--red); }
.status-info { background: rgba(0, 212, 255, 0.15); color: var(--cyan); border: 1px solid var(--cyan); }
.msg-box { text-align: center; padding: 20px; font-family: 'IBM Plex Mono', monospace; color: var(--yellow); }
.empty-msg { text-align: center; padding: 20px; color: var(--text-dim); font-size: 0.85rem; }

@keyframes slideIn { from { transform: translateY(-10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

/* ─── ASPECT RATIO MODES ─── */
#video-wrapper video { object-fit: contain; transition: object-fit 0.3s ease; }
#video-wrapper.ar-fill video { object-fit: fill !important; }
#video-wrapper.ar-cover video { object-fit: cover !important; }

/* ─── CUSTOM RATIO BUTTON ─── */
.custom-ratio-btn { position: relative; display: flex !important; align-items: center; justify-content: center; min-width: 34px; padding: 0 6px !important; cursor: pointer; border: none; background: transparent; color: inherit; }
.custom-ratio-btn svg { transition: transform 0.2s ease, color 0.2s ease; }
.custom-ratio-btn:active svg { transform: scale(0.8); color: var(--plyr-color-main); }
.custom-ratio-btn .plyr__tooltip { font-family: 'IBM Plex Mono', monospace !important; font-size: 0.62rem !important; white-space: nowrap; }
.custom-ratio-btn:hover { color: var(--plyr-color-main, #00e87a); }

/* ─── FULLSCREEN CSS ─── */
body.custom-fs-active { overflow: hidden; overscroll-behavior: none; }
body.custom-fs-active #app-root { position: fixed !important; top: 0 !important; left: 0 !important; right: 0 !important; bottom: 0 !important; width: 100vw !important; height: 100vh !important; max-width: none !important; margin: 0 !important; padding: 0 !important; z-index: 999999 !important; background: #000 !important; border-radius: 0 !important; overflow: hidden !important; display: flex !important; flex-direction: column !important; justify-content: center !important; }
body.custom-fs-active .video-panel { flex: 1 1 auto !important; border-radius: 0 !important; border: none !important; height: 100% !important; margin-bottom: 0 !important; }
body.custom-fs-active #video-wrapper, body.custom-fs-active #video-wrapper .plyr, body.custom-fs-active #video-wrapper .plyr__video-wrapper, body.custom-fs-active #video-wrapper video { height: 100% !important; max-height: 100% !important; border-radius: 0 !important; }
body.custom-fs-active .header, body.custom-fs-active #input-section, body.custom-fs-active .saved-section, body.custom-fs-active > *:not(#app-root) { display: none !important; }
.fs-exit-btn { display: none; position: fixed; top: max(12px, env(safe-area-inset-top)); left: 14px; z-index: 9999999; background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.2); color: #fff; font-family: 'IBM Plex Mono', monospace; font-size: 0.75rem; padding: 8px 16px; border-radius: 20px; cursor: pointer; backdrop-filter: blur(6px); }
body.custom-fs-active .fs-exit-btn { display: flex; align-items: center; gap: 6px; }
body.custom-fs-active .plyr__controls { z-index: 10000000 !important; }

/* ─── RESPONSIVE ─── */
@media (max-width: 768px) {
  body { padding: 8px; }
  .panel { padding: 12px; }
  .input-row { flex-direction: column; }
  .input-field { width: 100%; }
  .saved-list { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }
}
</style>
</head>
<body>

<button class="fs-exit-btn" id="fs-exit-btn" onclick="toggleCustomFullscreen()">✕ Exit</button>

<div id="app-root">
  <!-- HEADER -->
  <div class="header">
    <div class="header-left">
      <h1>// Online Video Player 🎬</h1>
      <p>Stream any video from anywhere</p>
    </div>
  </div>

  <!-- STATUS MESSAGES -->
  <div id="status-msg" class="status-msg"></div>

  <!-- INPUT SECTION -->
  <div id="input-section" class="panel">
    <div class="panel-hd">⚙️ Video URL Setup</div>
    
    <div class="input-row">
      <input type="text" id="video-url" class="input-field" placeholder="Paste video URL here (MP4, WebM, HLS, etc.)" />
      <button class="btn btn-green" onclick="pasteUrl()">📋 Paste</button>
    </div>

    <div class="input-row">
      <input type="text" id="video-title" class="input-field" placeholder="Video title (optional)" />
      <button class="btn btn-green" onclick="playVideo()">▶️ Play</button>
      <button class="btn btn-dim" onclick="saveVideo()">💾 Save</button>
    </div>
  </div>

  <!-- PLAYER SECTION -->
  <div id="player-section" style="display:none;">
    <div class="video-panel">
      <div id="video-wrapper">
        <video id="video" style="width:100%;" controls crossorigin playsinline></video>
      </div>
    </div>
  </div>

  <!-- SAVED VIDEOS SECTION -->
  <div id="saved-section" class="panel" style="display:none;">
    <div class="panel-hd">📚 Saved Videos</div>
    <div id="saved-list" class="saved-list"></div>
  </div>
</div>

<script>
let plyrPlayer;
let isCustomFullscreen = false;
let clonedFsBtn = null;

// Initialize
document.addEventListener('DOMContentLoaded', function() {
  loadSavedVideos();
});

// ─── STATUS MESSAGES ───
function showStatus(message, type = 'info') {
  const statusEl = document.getElementById('status-msg');
  statusEl.textContent = message;
  statusEl.className = `status-msg show status-${type}`;
  setTimeout(() => statusEl.classList.remove('show'), 4000);
}

// ─── FULLSCREEN ───
function toggleCustomFullscreen() {
  if (!isCustomFullscreen) {
    document.body.classList.add('custom-fs-active');
    isCustomFullscreen = true;
    if (clonedFsBtn) clonedFsBtn.classList.add('plyr__control--pressed');
  } else {
    document.body.classList.remove('custom-fs-active');
    isCustomFullscreen = false;
    if (clonedFsBtn) clonedFsBtn.classList.remove('plyr__control--pressed');
  }
}

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' && isCustomFullscreen) toggleCustomFullscreen();
});

// ─── ASPECT RATIO ───
let arIndex = 0;
const AR_CLASSES = ['', 'ar-fill', 'ar-cover'];
const AR_LABELS = ['Contain', 'Fill', 'Cover'];

function handleRatioClick(btnElement) {
  arIndex = (arIndex + 1) % AR_CLASSES.length;
  const wrapper = document.getElementById('video-wrapper');
  AR_CLASSES.forEach(cls => { if(cls) wrapper.classList.remove(cls); });
  if (AR_CLASSES[arIndex]) wrapper.classList.add(AR_CLASSES[arIndex]);
  const tooltip = document.getElementById('plyr-ar-tooltip');
  if (tooltip) tooltip.textContent = `Aspect: ${AR_LABELS[arIndex]}`;
}

// ─── PLYR SETUP ───
function setupPlyrInterface(video) {
  if (plyrPlayer) plyrPlayer.destroy();
  
  plyrPlayer = new Plyr(video, {
    controls: ['play-large', 'restart', 'rewind', 'play', 'fast-forward', 'progress', 'current-time', 'duration', 'mute', 'volume', 'settings', 'pip', 'fullscreen'],
    settings: ['quality', 'speed', 'loop'],
    autoplay: true
  });

  plyrPlayer.on('ready', () => {
    const controls = document.querySelector('#video-wrapper .plyr__controls');
    if (controls) {
      const ratioBtn = document.createElement('button');
      ratioBtn.type = 'button';
      ratioBtn.className = 'plyr__control custom-ratio-btn';
      ratioBtn.innerHTML = `
        <svg viewBox="0 0 18 18" style="width: 18px; height: 18px; fill: none; stroke: currentColor; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round;">
          <rect x="2" y="3" width="14" height="12" rx="2" />
          <path d="M7 9h4M9 7v4" />
        </svg>
        <span class="plyr__tooltip" id="plyr-ar-tooltip">Aspect: Contain</span>
      `;
      ratioBtn.addEventListener('click', (e) => { e.stopPropagation(); handleRatioClick(ratioBtn); });

      const originalFsBtn = controls.querySelector('[data-plyr="fullscreen"]');
      if (originalFsBtn) {
        controls.insertBefore(ratioBtn, originalFsBtn);
        clonedFsBtn = originalFsBtn.cloneNode(true);
        originalFsBtn.parentNode.replaceChild(clonedFsBtn, originalFsBtn);
        clonedFsBtn.addEventListener('click', (e) => { e.preventDefault(); e.stopPropagation(); toggleCustomFullscreen(); });
      }
    }
  });
}

// ─── VIDEO DETECTION ───
function detectVideoType(url) {
  if (!url) return null;
  
  url = url.toLowerCase();
  
  if (url.includes('.mp4') || url.includes('video/mp4')) return 'video/mp4';
  if (url.includes('.webm') || url.includes('video/webm')) return 'video/webm';
  if (url.includes('.ogv') || url.includes('.ogg') || url.includes('video/ogg')) return 'video/ogg';
  if (url.includes('.m3u8') || url.includes('application/x-mpegURL')) return 'application/x-mpegURL';
  if (url.includes('.mpd') || url.includes('application/dash+xml')) return 'application/dash+xml';
  
  // Guess by domain or URL pattern
  if (url.includes('youtube.com') || url.includes('youtu.be')) return 'youtube';
  
  return 'video/mp4'; // Default
}

// ─── PASTE URL ───
async function pasteUrl() {
  try {
    const text = await navigator.clipboard.readText();
    document.getElementById('video-url').value = text;
    showStatus('✅ URL pasted successfully!', 'success');
  } catch (err) {
    showStatus('❌ Failed to paste from clipboard', 'error');
  }
}

// ─── PLAY VIDEO ───
function playVideo() {
  const url = document.getElementById('video-url').value.trim();
  
  if (!url) {
    showStatus('❌ Please paste a video URL first', 'error');
    return;
  }

  const videoType = detectVideoType(url);
  
  if (videoType === 'application/dash+xml') {
    showStatus('⚠️ DASH streams require additional setup. Use MP4/WebM/HLS instead.', 'error');
    return;
  }

  const video = document.getElementById('video');
  video.innerHTML = ''; // Clear previous
  
  if (videoType === 'application/x-mpegURL') {
    // HLS Stream
    const source = document.createElement('source');
    source.src = url;
    source.type = videoType;
    video.appendChild(source);
  } else {
    // Regular video
    const source = document.createElement('source');
    source.src = url;
    source.type = videoType;
    video.appendChild(source);
    video.innerHTML += '<p>Your browser does not support HTML5 video.</p>';
  }

  document.getElementById('player-section').style.display = 'block';
  setupPlyrInterface(video);
  showStatus('▶️ Playing video...', 'success');
}

// ─── LOCALSTORAGE ───
function getSavedVideos() {
  const saved = localStorage.getItem('savedVideos');
  return saved ? JSON.parse(saved) : [];
}

function setSavedVideos(videos) {
  localStorage.setItem('savedVideos', JSON.stringify(videos));
}

function saveVideo() {
  const url = document.getElementById('video-url').value.trim();
  const title = document.getElementById('video-title').value.trim();
  
  if (!url) {
    showStatus('❌ Please paste a video URL first', 'error');
    return;
  }

  const savedVideos = getSavedVideos();
  
  // Check if URL already exists
  if (savedVideos.some(v => v.url === url)) {
    showStatus('⚠️ This URL is already saved', 'info');
    return;
  }

  const videoItem = {
    id: Date.now(),
    title: title || 'Untitled Video',
    url: url,
    timestamp: new Date().toLocaleString()
  };

  savedVideos.push(videoItem);
  setSavedVideos(savedVideos);
  
  showStatus('💾 Video saved successfully!', 'success');
  loadSavedVideos();
}

function loadSavedVideos() {
  const savedVideos = getSavedVideos();
  const savedList = document.getElementById('saved-list');
  const savedSection = document.getElementById('saved-section');

  if (savedVideos.length === 0) {
    savedSection.style.display = 'none';
    return;
  }

  savedSection.style.display = 'block';
  savedList.innerHTML = '';

  savedVideos.forEach(video => {
    const item = document.createElement('div');
    item.className = 'video-item';
    item.innerHTML = `
      <div>
        <div class="video-item-title">${escapeHtml(video.title)}</div>
        <div class="video-item-url" title="${escapeHtml(video.url)}">${escapeHtml(video.url.substring(0, 50))}${video.url.length > 50 ? '...' : ''}</div>
      </div>
      <div class="video-item-actions">
        <button class="video-item-btn video-item-play" onclick="playFromSaved('${escapeAttr(video.url)}', '${escapeAttr(video.title)}')">▶️ Play</button>
        <button class="video-item-btn video-item-delete" onclick="deleteVideo(${video.id})">🗑️ Delete</button>
      </div>
    `;
    savedList.appendChild(item);
  });
}

function playFromSaved(url, title) {
  document.getElementById('video-url').value = url;
  document.getElementById('video-title').value = title;
  playVideo();
}

function deleteVideo(id) {
  const savedVideos = getSavedVideos();
  const filtered = savedVideos.filter(v => v.id !== id);
  setSavedVideos(filtered);
  showStatus('🗑️ Video deleted', 'info');
  loadSavedVideos();
}

// ─── SECURITY ───
function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

function escapeAttr(text) {
  return text.replace(/'/g, "\\'");
}

// ─── PROTECTION ───
document.addEventListener('contextmenu', e => { if (e.target.closest('#video-wrapper')) e.preventDefault(); });
document.addEventListener('keydown', e => { if (e.ctrlKey && ['u','s','i'].includes(e.key.toLowerCase())) e.preventDefault(); });
</script>
</body>
</html>
