name: Build Pro APK
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2

      - name: Set up JDK 11
        uses: actions/setup-java@v1
        with:
          java-version: 11

      - name: Install Dependencies
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android
          mkdir -p www
          cp index.html www/

      - name: Initialize Capacitor
        run: |
          npx cap init "URL Player Pro" "com.pro.videoplayer" --web-dir www
          npx cap add android

      - name: Inject CORS Crusher (MainActivity.java)
        run: |
          mkdir -p android/app/src/main/java/com/pro/videoplayer/
          cat <<EOF > android/app/src/main/java/com/pro/videoplayer/MainActivity.java
          package com.pro.videoplayer;
          import android.os.Bundle;
          import android.webkit.WebSettings;
          import android.webkit.WebView;
          import com.getcapacitor.BridgeActivity;
          public class MainActivity extends BridgeActivity {
              @Override
              public void onStart() {
                  super.onStart();
                  WebView webView = this.bridge.getWebView();
                  WebSettings settings = webView.getSettings();
                  settings.setAllowUniversalAccessFromFileURLs(true);
                  settings.setDomStorageEnabled(true);
                  settings.setJavaScriptEnabled(true);
                  settings.setMixedContentMode(WebSettings.MIXED_CONTENT_ALWAYS_ALLOW);
              }
          }
          EOF

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Send APK to Telegram
        run: |
          APK_PATH=$(find android/app/build/outputs/apk/debug/ -name "*.apk")
          curl -F document=@"$APK_PATH" "https://api.telegram.org/bot7915586739:AAEBKLRjDgB0sckmtIUIbBrl12C86ebqmy4/sendDocument?chat_id=1250077365"
